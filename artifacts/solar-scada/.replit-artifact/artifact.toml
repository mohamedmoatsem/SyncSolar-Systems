kind = "web"
previewPath = "/"
title = "Solar SCADA Dashboard"
version = "1.0.0"
id = "artifacts/solar-scada"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23851

[services.development]
run = "pnpm --filter @workspace/solar-scada run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-scada", "run", "build" ]
publicDir = "artifacts/solar-scada/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23851"
BASE_PATH = "/"
