kind = "mobile"
previewPath = "/solar-mobile/"
title = "Solar SCADA Mobile"
version = "1.0.0"
id = "artifacts/solar-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/solar-mobile/" ]
localPort = 25392

[services.development]
run = "pnpm --filter @workspace/solar-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solar-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/solar-mobile", "run", "serve" ]

[services.env]
PORT = "25392"
BASE_PATH = "/solar-mobile/"
